<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello</title>
    <style>
      :root {
        --gold: #d4af37;
        --white: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #fff8dc 0%, var(--gold) 100%);
        color: var(--white);
        font-family: Georgia, "Times New Roman", serif;
      }
      main {
        text-align: center;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 14px;
        padding: 2rem 2.5rem;
      }
      h1 { margin: 0 0 .5rem; font-size: 2.4rem; }
      p { margin: 0; font-size: 1.05rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>Served from Proxmox LXC 101 via Cloudflare Tunnel.</p>
    </main>
  </body>
</html>
